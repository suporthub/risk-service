name: ci

on:
  push:
    branches: [v3_prod]

jobs:
  deploy-to-k3s:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Deploy securely over SSH (Direct Build)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_SERVER_IP }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          script: |
            set -e
            cd /v3/risk-service
            
            # Force server to match GitHub exactly (using automatic token to support private repos securely)
            git fetch https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git ${{ github.ref_name }}
            git reset --hard FETCH_HEAD
            
            # Get short SHA for precise tagging
            export SHA=$(git rev-parse --short HEAD)

            # Build the fresh local image natively (no-cache to ensure updates)
            docker build --no-cache -t risk-service:${SHA} .
            
            # Save and import it directly into the cluster runtime
            docker save risk-service:${SHA} | sudo k3s ctr images import -
            
            # Ensure the deployment manifest matches the repo
            kubectl apply -f /v3/k8s/risk-service-deployment.yaml
            
            # Update the deployment to use the new precise image tag
            kubectl set image deployment/risk-service risk-service=risk-service:${SHA} -n default
